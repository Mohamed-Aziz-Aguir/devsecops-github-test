apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-task-app
  namespace: devsecops
  labels:
    app: secure-task-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secure-task-app
  template:
    metadata:
      labels:
        app: secure-task-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: secure-task-app
          image: mohamedazizaguir/secure-task-app:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          # Health checks
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10

          # Resources
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # Security (important)
          securityContext:
            allowPrivilegeEscalation: false

      restartPolicy: Always
