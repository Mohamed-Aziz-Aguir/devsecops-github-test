apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: secure-task-monitor
  namespace: devsecops
spec:- rule: Unexpected shell in container
  desc: Detects a shell being spawned in any container
  condition: >
    spawned_process and container
    and shell_procs
    and not proc.pname in (shell_binaries)
  output: >
    Shell spawned in container
    (user=%user.name container=%container.name image=%container.image.repository
    shell=%proc.name parent=%proc.pname cmdline=%proc.cmdline)
  priority: WARNING
  tags: [container, shell, custom]

- rule: Write to sensitive directory
  desc: Detects any write to /etc or /usr in a container
  condition: >
    open_write and container
    and (fd.name startswith /etc/ or fd.name startswith /usr/)
    and not proc.name in (package_mgmt_binaries)
  output: >
    Sensitive directory write detected
    (user=%user.name file=%fd.name container=%container.name image=%container.image.repository)
  priority: ERROR
  tags: [container, filesystem, custom]

- rule: Outbound connection to suspicious port
  desc: Detects outbound connections to uncommon ports
  condition: >
    outbound and container
    and not fd.sport in (80, 443, 8080, 8443, 5432, 3306, 6379, 27017)
  output: >
    Outbound connection on suspicious port
    (user=%user.name container=%container.name port=%fd.sport
    image=%container.image.repository)
  priority: WARNING
  tags: [network, container, custom]

- rule: Privileged container started
  desc: Detects any privileged container being started
  condition: >
    container_started and container
    and container.privileged=true
  output: >
    Privileged container started
    (container=%container.name image=%container.image.repository)
  priority: CRITICAL
  tags: [container, privilege-escalation, custom]

- rule: Kubectl exec detected
  desc: Detects kubectl exec into a running container
  condition: >
    spawned_process and container
    and proc.name = "sh"
    and proc.pname = "kubectl"
  output: >
    kubectl exec into container detected
    (user=%user.name container=%container.name image=%container.image.repository)
  priority: WARNING
  tags: [container, kubernetes, custom]
  selector:
    matchLabels:
      app: secure-task-app
  endpoints:
    - port: metrics          # must match the port name in the service
      interval: 30s
      path: /metrics
