sonar.projectKey=secure-task-app
sonar.projectName=Secure Task App
sonar.projectVersion=1.0

sonar.sources=app
sonar.tests=tests

# Coverage report - generated by pytest-cov as coverage.xml
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
# Note: do NOT exclude tests/ from sonar.exclusions since sonar.tests=tests needs it
sonar.exclusions=**/venv/**,**/__pycache__/**
sonar.coverage.exclusions=**/tests/**,**/__pycache__/**
