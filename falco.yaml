rules_file:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/rules.d/custom_rules.yaml

json_output: true
json_include_output_property: true
log_stderr: true
log_syslog: false
log_level: info

outputs:
  rate: 1
  max_burst: 1000

stdout_output:
  enabled: true

file_output:
  enabled: true
  keep_alive: false
  filename: /var/log/falco/falco-alerts.log
